<app-modal-wrapper (close)="close.emit()">
  <h5 class="mb-4 text-body">{{ quote ? 'Edit quote' : 'Add quote' }}</h5>

  <form (ngSubmit)="onSubmit()">
    <div class="input-group mb-3">
      <span class="input-group-text">Quote</span>
      <input class="form-control" [(ngModel)]="content" name="content" />
    </div>
    <div class="input-group mb-3">
      <span class="input-group-text">Author</span>
      <input class="form-control" [(ngModel)]="author" name="author" />
    </div>
    <div class="d-flex gap-2 justify-content-end">
      <button type="button" class="btn btn-secondary" (click)="close.emit()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">Save</button>
    </div>
  </form>
</app-modal-wrapper>
