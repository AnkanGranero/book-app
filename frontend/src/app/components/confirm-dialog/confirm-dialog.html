<div
  class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-dark bg-opacity-50"
  (click)="decline.emit()"
>
  <div class="bg-white rounded p-4 position-relative" (click)="$event.stopPropagation()">
    <button class="btn-close position-absolute top-0 end-0 m-2" (click)="decline.emit()"></button>
    <p>{{ message }}</p>
    <button class="btn btn-danger me-2" (click)="confirm.emit()">Yes</button>
    <button class="btn btn-secondary" (click)="decline.emit()">No</button>
  </div>
</div>
