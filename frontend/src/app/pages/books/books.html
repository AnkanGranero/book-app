<h2 class="mb-4">Books</h2>

<div>
  @for (book of books(); track book.id) {
    <div class="card">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ book.title }}</h5>
        <p class="card-text">{{ book.author }}</p>
        <p class="card-text">{{ book.publishedDate }}</p>
        <button class="btn btn-primary align-self-end" (click)="openBookForm(book)">Edit</button>
      </div>
    </div>
  }
</div>
<button class="btn btn-primary mt-3" (click)="openBookForm()">Add book</button>
@if (showForm()) {
  <book-form [book]="selectedBook()" (close)="closeForm()" (saved)="loadBooks()" />
}
