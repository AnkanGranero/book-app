<h2 class="mb-4">Books</h2>

<div>
  @for (book of books(); track book.id) {
    <div class="card">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ book.title }}</h5>
        <p class="card-text text-body">{{ book.author }}</p>
        <p class="card-text text-body">{{ book.publishedDate }}</p>
        <button class="btn btn-primary align-self-end" (click)="openBookForm(book)">Edit</button>
        <button class="btn btn-danger align-self-end" (click)="openConfirmDialog(book)">
          Delete
        </button>
      </div>
    </div>
  }
</div>
<button class="btn btn-primary mt-3" (click)="openBookForm()">Add book</button>
@if (showForm()) {
  <app-book-form [book]="selectedBook()" (close)="closeBookForm()" (saved)="loadBooks()" />
}
@if (showConfirmDialog()) {
  <app-confirm-dialog
    [message]="confirmMessage()"
    (confirm)="onConfirm()"
    (decline)="onDecline()"
  />
}
