<h2 class="mb-3">Register</h2>
<form (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <label for="username" class="form-label">Username</label>
    <input type="text" class="form-control" [(ngModel)]="username" name="username" />
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input type="password" class="form-control" [(ngModel)]="password" name="password" />
  </div>
  <div class="mb-3">
    <label for="confirmPassword" class="form-label">Confirm password</label>
    <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" />
  </div>
  <button type="submit" class="btn btn-primary">Register</button>
  <a routerLink="/login" class="btn btn-secondary ms-3">Back to login</a>
</form>
